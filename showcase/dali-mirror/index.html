<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dali Mirror</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
    <style>
      :root {
        --glass-rim: rgba(255, 255, 255, 0.4);
        --glass-shadow: rgba(0, 0, 0, 0.6);
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #0a0a0a;
        overflow: hidden;
        font-family: "Times New Roman", serif;
      }

      #status {
        position: fixed;
        top: 20px;
        left: 20px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
        z-index: 1000;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      #interaction-guide {
        position: fixed;
        left: 24px;
        bottom: 24px;
        z-index: 1000;
        width: 280px;
        padding: 16px 18px;
        color: rgba(255, 255, 255, 0.68);
        background: rgba(10, 10, 10, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(14px);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.45);
        font-size: 12px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        line-height: 1.6;
      }

      #interaction-guide .guide-title {
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        margin-bottom: 10px;
        letter-spacing: 1.5px;
      }

      #interaction-guide .guide-row {
        display: grid;
        grid-template-columns: 95px 1fr;
        gap: 12px;
        margin: 6px 0;
      }

      #interaction-guide .guide-input {
        color: rgba(255, 255, 255, 0.9);
      }

      #interaction-guide .guide-output {
        color: rgba(255, 255, 255, 0.52);
      }

      #bg-video-blur {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(25px) grayscale(1) brightness(0.3);
        z-index: -2;
        transform: scaleX(-1);
      }

      #noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 500;
        pointer-events: none;
        opacity: 0.15;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      @keyframes flicker {
        0% {
          opacity: 0.97;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.98;
        }
      }

      #mirror-system {
        position: relative;
        width: 700px;
        height: 700px;
        transition: transform 0.1s ease-out;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: flicker 0.1s infinite;
      }

      .ring-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.3s ease;
        filter: drop-shadow(1px 1px 1px var(--glass-rim))
          drop-shadow(8px 8px 15px var(--glass-shadow));
      }

      .camera-video {
        position: absolute;
        width: 1100px;
        height: 1100px;
        object-fit: cover;
        transform-origin: center center;
        filter: grayscale(1) contrast(1.3) brightness(0.8);
      }

      #slice-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 180;
        pointer-events: none;
        opacity: 0;
        mix-blend-mode: screen;
        transition: opacity 0.12s ease-out;
      }

      .slice-strip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
        filter: drop-shadow(1px 1px 1px rgba(255, 255, 255, 0.25))
          drop-shadow(5px 5px 12px rgba(0, 0, 0, 0.55));
      }

      .slice-video {
        position: absolute;
        width: 1100px;
        height: 1100px;
        top: 50%;
        left: 50%;
        object-fit: cover;
        transform-origin: center center;
        filter: grayscale(1) contrast(1.45) brightness(0.8);
      }

      .glass-sheen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.15) 0%,
            rgba(255, 255, 255, 0) 50%
          ),
          linear-gradient(
            45deg,
            rgba(255, 255, 255, 0) 45%,
            rgba(255, 255, 255, 0.05) 50%,
            rgba(255, 255, 255, 0) 55%
          );
        z-index: 200;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .numbers-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 300;
        pointer-events: none;
        filter: grayscale(1);
      }

      .num {
        position: absolute;
        color: rgba(255, 255, 255, 0.8);
        font-size: 4.5rem;
        font-weight: bold;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
      }

      .n12 {
        top: 5%;
        left: 50%;
        transform: translateX(-50%) scaleY(1.3);
      }
      .n3 {
        right: 5%;
        top: 50%;
        transform: translateY(-50%) scaleX(1.3);
      }
      .n6 {
        bottom: 5%;
        left: 50%;
        transform: translateX(-50%) scaleY(1.3);
      }
      .n9 {
        left: 5%;
        top: 50%;
        transform: translateY(-50%) scaleX(1.3);
      }

      #vignette {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(0, 0, 0, 0) 40%,
          rgba(0, 0, 0, 0.7) 100%
        );
        z-index: 400;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="status">INITIATING TEMPORAL MIRROR...</div>

    <div id="interaction-guide">
      <div class="guide-title">Interaction Logic</div>

      <div class="guide-row">
        <div class="guide-input">Hand Depth</div>
        <div class="guide-output">Controls ring layers and depth</div>
      </div>

      <div class="guide-row">
        <div class="guide-input">Finger Curl</div>
        <div class="guide-output">Stops or releases ring rotation</div>
      </div>

      <div class="guide-row">
        <div class="guide-input">Pinch Distance</div>
        <div class="guide-output">Controls horizontal slice dislocation</div>
      </div>

      <div class="guide-row">
        <div class="guide-input">Mouse Move</div>
        <div class="guide-output">Controls mirror perspective</div>
      </div>
    </div>

    <div id="noise-overlay"></div>
    <div id="vignette"></div>

    <video id="webcam" style="display: none" autoplay playsinline></video>
    <video id="bg-video-blur" autoplay muted playsinline></video>

    <div id="mirror-system">
      <div id="slice-overlay"></div>

      <div class="glass-sheen" id="sheen"></div>

      <div class="numbers-overlay">
        <div class="num n12">12</div>
        <div class="num n3">3</div>
        <div class="num n6">6</div>
        <div class="num n9">9</div>
      </div>
    </div>

    <script type="module">
      import {
        HandLandmarker,
        FilesetResolver,
      } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

      const system = document.getElementById("mirror-system");
      const sliceOverlay = document.getElementById("slice-overlay");
      const bgVideoBlur = document.getElementById("bg-video-blur");
      const webcamElement = document.getElementById("webcam");
      const statusElement = document.getElementById("status");

      const MAX_LAYERS = 25;
      const MIN_LAYERS = 4;
      const baseAngleStep = 35;
      const videoElements = [];
      const layerContainers = [];
      const SHAPE_SEED = 1.5;

      const SLICE_COUNT = 28;
      const sliceElements = [];
      const sliceVideos = [];

      let targetMultiplier = 1;
      let currentMultiplier = 1;
      let targetDepth = 0;
      let currentDepth = 0;

      let targetSliceStrength = 0;
      let currentSliceStrength = 0;

      let handLandmarker = undefined;

      async function initHandDetection() {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm",
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
            delegate: "GPU",
          },
          runningMode: "VIDEO",
          numHands: 1,
        });
        statusElement.innerText = "MIRROR READY - EXTEND HAND";
        initCamera();
      }

      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 1280, height: 720 },
          });

          webcamElement.srcObject = stream;
          bgVideoBlur.srcObject = stream;

          videoElements.forEach((video) => (video.srcObject = stream));
          sliceVideos.forEach((video) => (video.srcObject = stream));

          webcamElement.addEventListener("loadeddata", predictWebcam);
          requestAnimationFrame(updateAnimation);
        } catch (err) {
          statusElement.innerText = "CAMERA ACCESS DENIED";
        }
      }

      function getDistance(a, b) {
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function calculatePinchStrength(landmarks) {
        const thumbTip = landmarks[4];
        const indexTip = landmarks[8];

        const thumbIndexDistance = getDistance(thumbTip, indexTip);

        const palmWidth = getDistance(landmarks[5], landmarks[17]);
        const normalizedDistance = thumbIndexDistance / palmWidth;

        const minDistance = 0.35;
        const maxDistance = 1.7;

        let strength =
          1 - (normalizedDistance - minDistance) / (maxDistance - minDistance);
        strength = Math.min(Math.max(strength, 0), 1);

        return strength;
      }

      async function predictWebcam() {
        let startTimeMs = performance.now();

        if (handLandmarker) {
          const results = handLandmarker.detectForVideo(
            webcamElement,
            startTimeMs,
          );

          if (results.landmarks && results.landmarks.length > 0) {
            const landmarks = results.landmarks[0];

            let foldedFingers = 0;
            const fingerTips = [8, 12, 16, 20];
            const fingerBases = [5, 9, 13, 17];

            for (let i = 0; i < 4; i++) {
              if (landmarks[fingerTips[i]].y > landmarks[fingerBases[i]].y)
                foldedFingers++;
            }

            targetMultiplier = foldedFingers >= 3 ? 0 : 1;

            const dx = landmarks[5].x - landmarks[17].x;
            const dy = landmarks[5].y - landmarks[17].y;
            const handSize = Math.sqrt(dx * dx + dy * dy);

            let depth = (handSize - 0.08) / 0.22;
            targetDepth = Math.min(Math.max(depth, 0), 1);

            targetSliceStrength = calculatePinchStrength(landmarks);

            if (targetSliceStrength > 0.15) {
              statusElement.innerText = "PINCH SLICE ACTIVE";
            } else {
              statusElement.innerText = "MIRROR READY - EXTEND HAND";
            }
          } else {
            targetSliceStrength = 0;
            statusElement.innerText = "NO HAND DETECTED";
          }
        }

        requestAnimationFrame(predictWebcam);
      }

      function generateSmoothPath(radius) {
        if (radius <= 0) return "none";

        const points = [];
        const segments = 50;

        for (let i = 0; i <= segments; i++) {
          const angle = (i / segments) * Math.PI * 2;
          const distortionFactor =
            Math.sin(angle * 3 + SHAPE_SEED) * 0.1 + Math.cos(angle * 2) * 0.05;
          const r = radius * (1 + distortionFactor);
          const x = 50 + Math.cos(angle) * r;
          const y = 50 + Math.sin(angle) * r;
          points.push(`${x.toFixed(1)}% ${y.toFixed(1)}%`);
        }

        return `polygon(${points.join(", ")})`;
      }

      function updateSliceDislocation() {
        currentSliceStrength += (targetSliceStrength - currentSliceStrength) * 0.12;

        const strength = currentSliceStrength;

        sliceOverlay.style.opacity =
          strength > 0.03 ? `${0.12 + strength * 0.78}` : "0";

        sliceElements.forEach((strip, i) => {
          const top = (i / SLICE_COUNT) * 100;
          const bottom = 100 - ((i + 1) / SLICE_COUNT) * 100;

          strip.style.clipPath = `inset(${top}% 0% ${bottom}% 0%)`;

          const direction = i % 2 === 0 ? 1 : -1;
          const pseudoRandom = Math.sin(i * 17.17) * 0.5 + 0.5;

          const offsetX = direction * strength * (25 + pseudoRandom * 120);
          const offsetY = direction * strength * pseudoRandom * 2;
          const rotate = direction * strength * pseudoRandom * 1.2;
          const scale = 1.02 + strength * 0.05;

          const video = sliceVideos[i];

          video.style.transform = `
            translate(-50%, -50%)
            scaleX(-1)
            translate(${offsetX}px, ${offsetY}px)
            rotate(${rotate}deg)
            scale(${scale})
          `;

          video.style.filter = `
            grayscale(1)
            contrast(${1.25 + strength * 0.75})
            brightness(${0.86 - strength * 0.16})
            blur(${strength * pseudoRandom * 0.8}px)
          `;
        });
      }

      function updateAnimation() {
        currentMultiplier += (targetMultiplier - currentMultiplier) * 0.08;
        currentDepth += (targetDepth - currentDepth) * 0.05;

        const dynamicLayerCount =
          MIN_LAYERS + currentDepth * (MAX_LAYERS - MIN_LAYERS);

        videoElements.forEach((video, i) => {
          const layer = layerContainers[i];

          if (i < dynamicLayerCount) {
            const dynamicRadius = 50 * (1 - i / dynamicLayerCount);
            layer.style.opacity = "1";
            layer.style.clipPath = generateSmoothPath(dynamicRadius);

            const parallax = i * 1.5 * currentDepth;
            const fixedRotation = i * baseAngleStep * currentMultiplier;

            video.style.transform = `scaleX(-1) translate(${parallax}px, ${parallax}px) rotate(${fixedRotation}deg)`;
            video.style.filter = `grayscale(1) contrast(${1.2 + i * 0.05}) brightness(${0.9 - i * 0.02})`;
          } else {
            layer.style.opacity = "0";
          }
        });

        updateSliceDislocation();

        requestAnimationFrame(updateAnimation);
      }

      for (let i = 0; i < MAX_LAYERS; i++) {
        const wrap = document.createElement("div");
        wrap.className = "glass-layer-wrap";
        wrap.style.position = "absolute";
        wrap.style.width = "100%";
        wrap.style.height = "100%";
        wrap.style.zIndex = i;

        const layer = document.createElement("div");
        layer.className = "ring-layer";

        const video = document.createElement("video");
        video.className = "camera-video";
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;

        videoElements.push(video);
        layerContainers.push(layer);

        layer.appendChild(video);
        wrap.appendChild(layer);
        system.insertBefore(wrap, system.firstChild);
      }

      for (let i = 0; i < SLICE_COUNT; i++) {
        const strip = document.createElement("div");
        strip.className = "slice-strip";
        strip.style.zIndex = i;

        const video = document.createElement("video");
        video.className = "slice-video";
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;

        strip.appendChild(video);
        sliceOverlay.appendChild(strip);

        sliceElements.push(strip);
        sliceVideos.push(video);
      }

      window.addEventListener("mousemove", (e) => {
        const x = e.clientX / window.innerWidth - 0.5;
        const y = e.clientY / window.innerHeight - 0.5;

        system.style.transform = `perspective(1200px) rotateX(${y * 20}deg) rotateY(${-x * 20}deg) rotateZ(${x * 10}deg)`;
        document.getElementById("sheen").style.transform = `translate(${x * 40}px, ${y * 40}px)`;
      });

      initHandDetection();
    </script>
  </body>
</html>
